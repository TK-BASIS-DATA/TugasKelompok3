{% extends 'base.html' %}
{% block content %}
<div class="container mx-auto py-6 max-w-lg">
  <div class="bg-white rounded-xl shadow p-6">
    <h1 class="text-2xl font-bold mb-4">{% if is_create %}Tambah Identitas{% else %}Edit Identitas{% endif %}</h1>
    <form method="post" class="space-y-4">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="flex gap-2 justify-end mt-6">
        <div class="bg-white rounded-lg shadow border border-blue-300 px-4 py-3 flex gap-2">
          <button type="submit" class="btn btn-primary">Simpan</button>
          <p>|</p>
          <a href="{% url 'member_identitas' %}" class="btn btn-secondary">Batal</a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
