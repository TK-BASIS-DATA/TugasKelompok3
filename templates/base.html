<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero Miles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        display: ['Syne', 'sans-serif']
                    },
                    colors: {
                        aero: {
                            ink: '#092635',
                            steel: '#1B4242',
                            mint: '#5C8374',
                            cloud: '#D9F2EC',
                            sunrise: '#F4A261'
                        }
                    },
                    keyframes: {
                        rise: {
                            '0%': { opacity: '0', transform: 'translateY(18px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        }
                    },
                    animation: {
                        rise: 'rise .5s ease-out forwards'
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-aero-cloud via-white to-[#F9F6EC] text-aero-ink font-sans">
    <div class="fixed inset-0 -z-10 overflow-hidden">
        <div class="absolute -top-28 -right-24 h-72 w-72 rounded-full bg-aero-mint/25 blur-3xl"></div>
        <div class="absolute top-1/3 -left-20 h-72 w-72 rounded-full bg-aero-sunrise/20 blur-3xl"></div>
        <div class="absolute bottom-0 right-1/4 h-56 w-56 rounded-full bg-aero-steel/20 blur-3xl"></div>
    </div>

    <nav class="sticky top-0 z-30 border-b border-white/40 bg-white/80 backdrop-blur-md">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 md:px-6">
            <a href="{% url 'auth_page' %}" class="font-display text-xl tracking-tight text-aero-steel">Aero Miles</a>

            <div class="hidden flex-wrap items-center gap-3 text-sm font-semibold lg:flex">
                {% if user.is_authenticated %}
                    <a href="{% url 'logout' %}" class="rounded-full bg-aero-steel px-4 py-2 text-white hover:bg-aero-ink">Logout</a>
                {% else %}
                    <a href="{% url 'auth_page' %}" class="rounded-full px-3 py-2 hover:bg-aero-cloud">Login</a>
                    <a href="{% url 'auth_page' %}?role=member" class="rounded-full bg-aero-steel px-4 py-2 text-white hover:bg-aero-ink">Registrasi</a>
                {% endif %}
            </div>

            <div class="lg:hidden">
                <details class="relative">
                    <summary class="list-none cursor-pointer rounded-full bg-aero-steel px-4 py-2 text-sm font-semibold text-white">Menu</summary>
                    <div class="absolute right-0 mt-2 w-64 rounded-2xl border border-aero-cloud bg-white p-3 shadow-xl">
                        <div class="flex flex-col text-sm font-semibold text-aero-ink">
                            {% if user.is_authenticated %}
                                <a href="{% url 'logout' %}" class="rounded-lg bg-aero-steel px-3 py-2 text-white">Logout</a>
                            {% else %}
                                <a href="{% url 'auth_page' %}" class="rounded-lg px-3 py-2 hover:bg-aero-cloud">Login</a>
                                <a href="{% url 'auth_page' %}?role=member" class="mt-1 rounded-lg bg-aero-steel px-3 py-2 text-white">Registrasi</a>
                            {% endif %}
                        </div>
                    </div>
                </details>
            </div>
        </div>
    </nav>

    <main class="mx-auto w-full max-w-7xl px-4 py-8 md:px-6 md:py-10">
        {% if messages %}
            <div class="mb-6 space-y-3">
                {% for message in messages %}
                    <div class="animate-rise rounded-2xl border border-aero-mint/30 bg-white/85 px-4 py-3 text-sm font-semibold text-aero-ink shadow-sm">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
